<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国杀 · 选择模式</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <div id="home-screen">
        <div class="home-bg-overlay"></div>
        <div class="home-content">
            <div class="home-title-area">
                <h1 class="home-title">三 国 杀</h1>
                <p class="home-subtitle">选择对战模式</p>
            </div>

            <div class="mode-cards">
                <a href="1v1.html" class="mode-card mode-1v1">
                    <div class="mode-icon">⚔️</div>
                    <div class="mode-name">双人对战</div>
                    <div class="mode-desc">一对一单挑，你与AI各选一名武将，策略博弈，一决胜负</div>
                    <div class="mode-players">2 人</div>
                    <div class="mode-enter">进入对战 →</div>
                </a>

                <a href="multi.html" class="mode-card mode-multi">
                    <div class="mode-icon">🏰</div>
                    <div class="mode-name">多人对战</div>
                    <div class="mode-desc">多名武将混战，支持3~6人对局，合纵连横，谁能笑到最后</div>
                    <div class="mode-players">3~6 人</div>
                    <div class="mode-enter">进入对战 →</div>
                </a>
            </div>

            <div class="docs-link-bar">
                <a href="guide.html" class="docs-link-item">
                    <span class="docs-link-icon">📖</span>
                    <span class="docs-link-text">游戏说明</span>
                </a>
                <a href="guide.html#rules" class="docs-link-item">
                    <span class="docs-link-icon">📜</span>
                    <span class="docs-link-text">游戏规则</span>
                </a>
                <a href="cards.html" class="docs-link-item">
                    <span class="docs-link-icon">🃏</span>
                    <span class="docs-link-text">卡牌介绍</span>
                </a>
                <a href="heroes.html" class="docs-link-item">
                    <span class="docs-link-icon">👥</span>
                    <span class="docs-link-text">成员介绍</span>
                </a>
                <a href="skills.html" class="docs-link-item">
                    <span class="docs-link-icon">⚡</span>
                    <span class="docs-link-text">特技介绍</span>
                </a>
            </div>

            <div class="home-footer">
                <p>选择模式后进入武将选择界面</p>
            </div>
        </div>
    </div>
</body>
</html>
